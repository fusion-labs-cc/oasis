<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>OASIS</title>
  </head>
  <body>
    <header>
      <a class="brand" href="https://oasis.fusion-labs.cc" target="_blank" rel="noreferrer"
         title="Open oasis.fusion-labs.cc">
        <img class="logo" src="icons/icon48.png" alt="" />
        <h1>OASIS</h1>
      </a>
      <div class="actions">
        <button id="save" type="button">Save current tab</button>
        <button id="hide" type="button" class="icon-btn" title="Hide list" aria-label="Hide list"></button>
      </div>
    </header>

    <p id="status" class="status" hidden></p>

    <!-- Normal view: the saved list. In hidden mode the whole thing is withheld;
         the eye icon in the header toggles it back. -->
    <section id="listView">
      <ul id="list" class="list"></ul>
      <p id="empty" class="empty" hidden>No URLs saved yet.</p>
    </section>

    <footer class="site-footer">
      <a href="https://oasis.fusion-labs.cc" target="_blank" rel="noreferrer">
        Open Oasis
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 17L17 7M9 7h8v8" />
        </svg>
      </a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
