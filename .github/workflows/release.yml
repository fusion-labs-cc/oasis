name: Release

# Push a version tag to build the backend for each OS and publish a GitHub
# Release with every artifact attached:
#     git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:      # manual run from the Actions tab (builds only, no release)
    inputs:
      platform:
        description: "Platform(s) to build on a manual run"
        type: choice
        default: both
        options: [both, windows, macos]

permissions:
  contents: write         # required to create the Release

jobs:
  build-windows:
    # On a tag push always build; on a manual run only if windows was selected.
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["both","windows"]'), github.event.inputs.platform) }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      # Stamps that describe the *executable*, bundled into it by
      # oasis-backend.spec and read back by version.py:
      #   PLATFORM — the asset this job produces, so a build that ever needs a
      #              full reinstall fetches the same variant it came from.
      #   RUNTIME  — fingerprint of the Python + requirements.txt + launcher this
      #              is frozen against. A later release stamped the same can be
      #              installed by replacing app/ alone, no new .exe.
      # (VERSION is not stamped here — it ships with the source, in app/VERSION.)
      - name: Stamp platform and runtime
        shell: bash
        run: |
          printf '%s' 'oasis-backend-win64.zip' > PLATFORM
          python scripts/app_payload.py --runtime > RUNTIME

      - name: Build backend (onedir)
        run: pyinstaller --noconfirm oasis-backend.spec

      # The backend's source is NOT inside the .exe — it ships next to it, and is
      # imported from there at runtime. Same payload as oasis-backend-patch.zip below.
      - name: Assemble the app payload
        shell: bash
        run: python scripts/app_payload.py --build dist/oasis-backend/app --version "$GITHUB_REF_NAME"

      - name: Bundle FFmpeg
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $bin = "dist/oasis-backend/bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $exe = Get-ChildItem ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName "$bin/ffmpeg.exe"
          # GPL-3.0 requires the license to accompany the redistributed binary.
          $lic = Get-ChildItem ffmpeg_extracted -Recurse -Filter LICENSE* | Select-Object -First 1
          if ($lic) { Copy-Item $lic.FullName "$bin/ffmpeg-LICENSE.txt" }

      # Upload the onedir folder itself (not a pre-made zip). upload-artifact
      # always zips its input, so uploading a zip would nest zip-in-zip on
      # download; uploading the folder yields a single clean zip. Windows has no
      # exec bit or symlinks to lose, so the raw folder round-trips fine. The
      # release job produces the final distributable zip.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-backend-win64
          path: dist/oasis-backend

  build-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || contains(fromJSON('["both","macos"]'), github.event.inputs.platform) }}
    runs-on: macos-latest     # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      # See the Windows job for what these stamps are and why VERSION isn't one.
      - name: Stamp platform and runtime
        run: |
          printf '%s' 'oasis-backend-macos-arm64.zip' > PLATFORM
          python scripts/app_payload.py --runtime > RUNTIME

      - name: Build backend (onedir)
        run: pyinstaller --noconfirm oasis-backend.spec

      - name: Assemble the app payload
        run: python scripts/app_payload.py --build dist/oasis-backend/app --version "$GITHUB_REF_NAME"

      - name: Bundle FFmpeg
        run: |
          url="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          curl -fsSL "$url" -o ffmpeg.zip
          unzip -q ffmpeg.zip -d ffmpeg_extracted
          bin="dist/oasis-backend/bin"
          mkdir -p "$bin"
          ff="$(find ffmpeg_extracted -type f -name ffmpeg | head -1)"
          cp "$ff" "$bin/ffmpeg"
          chmod +x "$bin/ffmpeg"
          # GPL builds ship their license text; carry it alongside the binary.
          lic="$(find ffmpeg_extracted -iname 'LICENSE*' -o -iname 'GPL*' | head -1)"
          if [ -n "$lic" ]; then cp "$lic" "$bin/ffmpeg-LICENSE.txt"; fi

      - name: Package zip
        # `ditto` preserves the executable bit and PyInstaller's symlinks inside
        # the app folder, which a plain Compress step would flatten. No parent
        # folder, so the layout matches the Windows zip (contents at the root).
        run: ditto -c -k --sequesterRsrc dist/oasis-backend oasis-backend-macos-arm64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-backend-macos-arm64
          path: oasis-backend-macos-arm64.zip

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      # Checkout first: it cleans the workspace, which would wipe the downloaded
      # artifacts if they landed before it.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"      # must match the build jobs: the RUNTIME
                                      # stamp includes the Python version, and a
                                      # mismatch here would make every update take
                                      # the full path for no reason.

      # The star of the release: the backend source on its own, with no executable
      # and no frozen runtime. An installed build whose RUNTIME matches this one
      # updates by unzipping this over app/ — ~35 KB, and it replaces nothing the
      # OS has locked. The two zips below are only needed for a first install, or
      # when the frozen runtime itself changed.
      - name: Build the source-only update payload
        run: |
          python scripts/app_payload.py --build app --version "$GITHUB_REF_NAME"
          (cd app && zip -qr ../oasis-backend-patch.zip .)

      # The browser extension is pure static assets — no per-OS build — so it
      # ships as one OS-independent zip (like oasis-backend-patch.zip above), never bundled
      # into the win64/macOS backend installs, whose bytes it would only
      # duplicate. manifest.json sits at the zip root, which is what Chrome wants
      # for "Load unpacked" / Web Store upload. Its version is independent of the
      # tag (it lives in chrome-extension/manifest.json).
      - name: Zip the browser extension
        run: (cd chrome-extension && zip -qr ../oasis-chrome-extension.zip . -x '*.DS_Store')

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The Windows artifact is the raw onedir folder; zip it here into the
      # final distributable (contents at the root). The macOS artifact is
      # already a ditto zip that preserves perms/symlinks, so it passes through.
      - name: Zip the Windows build
        run: (cd artifacts/oasis-backend-win64 && zip -qr ../oasis-backend-win64.zip .)

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            oasis-backend-patch.zip
            oasis-chrome-extension.zip
          generate_release_notes: true
